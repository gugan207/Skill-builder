<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MIT Skill Builder - Interactive Python practice for exam preparation. 24 questions across 5 weeks.">
  <title>MIT Skill Builder</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <!-- CodeMirror 5 via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/anyword-hint.min.js"></script>
</head>
<body>

  <!-- ══ Top Navigation Bar ══ -->
  <nav class="top-nav" id="top-nav">
    <div class="nav-left">
      <button class="nav-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="nav-brand">
        <span class="nav-logo">⚡</span>
        <span class="nav-title">MIT Skill Builder</span>
      </div>
    </div>
    <div class="nav-center">
      <div class="nav-progress">
        <span class="nav-progress-label" id="progress-text">0/24 solved</span>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="nav-right" id="user-bar" style="display:none">
      <span class="user-greeting" id="user-greeting">👋 Hello</span>
      <button class="btn-logout" id="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </nav>

  <!-- ══ Main Workspace ══ -->
  <div class="app">

    <!-- LEFT: Problem Panel (40%) -->
    <div class="left-panel">
      <div class="q-selector" id="week-tabs"></div>
      <div class="q-tabs" id="q-tabs"></div>
      <div class="q-content" id="q-content">
        <div class="q-title" id="q-title">Select a question</div>
        <div class="q-desc" id="q-desc">Pick a question from the tabs above to begin practicing.</div>
      </div>
      <div class="q-nav">
        <button class="btn" onclick="navQuestion(-1)">← Prev</button>
        <button class="btn" onclick="navQuestion(1)">Next →</button>
      </div>
    </div>

    <!-- Resizable Divider -->
    <div class="divider" id="divider"></div>

    <!-- RIGHT: IDE Panel (60%) -->
    <div class="right-panel">
      <div class="ide-header">
        <div class="ide-header-left">
          <span class="ide-lang-badge">🐍 Python 3.10</span>
          <span class="ide-autosave" id="autosave-indicator">● Auto-saved</span>
        </div>
        <div class="ide-actions">
          <button class="btn btn-sm btn-ghost" onclick="toggleHint()" title="Show hint">💡 Hint</button>
          <button class="btn btn-sm btn-ghost" onclick="toggleSolution()" title="View answer">👁 Answer</button>
          <button class="btn btn-sm btn-ghost" onclick="loadSolution()" title="Load solution into editor">📋 Load</button>
          <button class="btn btn-sm btn-ghost" onclick="clearCode()" title="Clear editor">🗑 Clear</button>
          <button class="btn btn-sm btn-theme" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
        </div>
      </div>
      <div class="hint-box" id="hint-box" style="display:none"></div>
      <div class="solution-box" id="solution-box" style="display:none"></div>
      <!-- CodeMirror Editor Container -->
      <div class="editor-wrapper" id="editor-wrapper">
        <textarea id="code-area" style="display:none"></textarea>
      </div>
      <div class="status-bar">
        <span id="cursor-pos">Ln 1, Col 1</span>
        <span id="char-count">0 chars</span>
        <span class="status-shortcut">Ctrl+Enter: Run &nbsp;|&nbsp; Ctrl+/: Comment</span>
      </div>
      <div class="run-bar">
        <button class="btn btn-run" id="run-btn" onclick="runTests()">▶ Run Tests</button>
        <span class="run-hint">Ctrl+Enter</span>
      </div>
      <div class="results-resizer" id="results-resizer"></div>
      <div class="results-panel" id="results-panel">
        <div class="results-header" id="results-header">
          <span>📊 Test Results</span>
          <div class="results-actions">
            <span id="results-count"></span>
            <button class="btn-icon" id="toggle-float-btn" onclick="toggleFloatResults()" title="Float/Dock Panel">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M9 2v20"/></svg>
            </button>
          </div>
        </div>
        <div class="results-body" id="output-area">
          <div class="result-block result-neutral">Write your code and press <kbd>Ctrl+Enter</kbd> or click "Run Tests" to check.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Panel Toggle -->
  <button class="panel-toggle" id="panel-toggle" onclick="togglePanel()" title="Switch panel">📝</button>

  <!-- Auth guard -->
  <script>
    if (!localStorage.getItem('sb_user')) {
      window.location.replace('login.html');
    }
  </script>

  <script src="https://skulpt.org/js/skulpt.min.js"></script>
  <script src="https://skulpt.org/js/skulpt-stdlib.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script src="app-sync.js"></script>
</body>
</html>
