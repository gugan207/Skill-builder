<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MIT Skill Builder — Login to track your Python practice progress across devices.">
  <title>MIT Skill Builder — Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-effects">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="login-container">
    <!-- Logo / Branding -->
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h1>MIT Skill Builder</h1>
      <p class="brand-tagline">Master Python. Ace Your Exams.</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card" id="auth-card">
      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-signup">Sign Up</button>
        <div class="tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form">
        <div class="input-group">
          <label for="login-email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="login-password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
            <button type="button" class="toggle-pw" data-target="login-password" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-auth" id="login-btn">
          <span class="btn-text">Sign In</span>
          <div class="btn-loader" style="display:none"></div>
        </button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signup-form">
        <div class="input-group">
          <label for="signup-name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
          </div>
        </div>
        <div class="input-group">
          <label for="signup-email">Email</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="input-group">
          <label for="signup-password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-pw" data-target="signup-password" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="input-group">
          <label for="signup-confirm">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="signup-confirm" placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn-auth" id="signup-btn">
          <span class="btn-text">Create Account</span>
          <div class="btn-loader" style="display:none"></div>
        </button>
      </form>

      <!-- Messages -->
      <div class="auth-message" id="auth-message" style="display:none"></div>


    </div>

    <!-- Footer -->
    <p class="login-footer">Your progress is saved to the cloud when signed in ☁️</p>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
